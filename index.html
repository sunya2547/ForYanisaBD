<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday to my Luangmae</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#00539C;
    --primary-dark:#00305c;
    --primary-light:#3E86C9;
    --galaxy-1:#050818;
    --galaxy-2:#0B1440;
    --galaxy-3:#1B2A6B;
    --accent-gold:#FFD166;
    --accent-pink:#FF6FA5;
    --glass:rgba(255,255,255,0.07);
    --glass-border:rgba(255,255,255,0.18);
    --text:#EAF2FF;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;overflow:hidden;
    font-family:'Kanit','Poppins',sans-serif;
    color:var(--text);
    background:var(--galaxy-1);
  }
  body{
    display:flex;align-items:center;justify-content:center;
    position:relative;
    transition:background 1.2s ease;
  }

  /* ===== Galaxy background layers ===== */
  #stars{position:fixed;inset:0;z-index:0;}
  .nebula{
    position:fixed;border-radius:50%;filter:blur(70px);opacity:.35;
    z-index:0;pointer-events:none;
  }
  .nebula.n1{width:420px;height:420px;background:var(--primary);top:-100px;left:-120px;animation:drift 18s ease-in-out infinite;}
  .nebula.n2{width:360px;height:360px;background:var(--accent-pink);bottom:-120px;right:-100px;animation:drift 22s ease-in-out infinite reverse;}
  .nebula.n3{width:300px;height:300px;background:var(--galaxy-3);top:40%;left:60%;animation:drift 26s ease-in-out infinite;}
  @keyframes drift{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(30px,-20px) scale(1.15);}
  }

  #confetti-canvas,#fireworks-canvas{
    position:fixed;inset:0;width:100%;height:100%;z-index:5;pointer-events:none;display:none;
  }

  /* ===== Window chrome (Windows + Galaxy glass) ===== */
  .os-window{
    position:relative;z-index:10;
    width:90%;max-width:400px;
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:16px;
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 8px 40px rgba(0,20,60,0.55), 0 0 0 1px rgba(255,255,255,0.03) inset;
    opacity:0;transform:translateY(16px) scale(.98);
    pointer-events:none;
    transition:opacity .5s ease, transform .5s ease;
  }
  .os-window.active{opacity:1;transform:translateY(0) scale(1);pointer-events:all;}

  .title-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;
    background:linear-gradient(90deg,var(--primary-dark),var(--primary));
    border-radius:16px 16px 0 0;
    font-size:13px;letter-spacing:.5px;font-weight:500;
  }
  .traffic{display:flex;gap:7px;}
  .dot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 4px rgba(0,0,0,.4) inset;}
  .dot.red{background:#FF5F57;}
  .dot.yellow{background:#FEBC2E;}
  .dot.green{background:#28C840;}

  .content{padding:26px 22px 24px;text-align:center;}
  .content p{font-size:14.5px;line-height:1.6;margin:0 0 14px;color:#DCE9FF;}

  input[type="date"]{
    width:85%;padding:9px 10px;margin:6px 0 16px;
    border-radius:10px;border:1px solid var(--glass-border);
    background:rgba(255,255,255,0.9);color:#111;
    font-family:'Kanit',sans-serif;font-size:14px;
  }

  .btn{
    background:linear-gradient(135deg,var(--primary-light),var(--primary));
    color:#fff;border:none;padding:10px 26px;border-radius:10px;
    font-family:'Kanit',sans-serif;font-size:14px;font-weight:500;
    cursor:pointer;box-shadow:0 4px 14px rgba(0,83,156,0.5);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,83,156,.65);}
  .btn:active{transform:translateY(0) scale(.96);}

  /* ===== Floating troll dialog ===== */
  .alert-box{
    position:fixed;z-index:15;
    width:86%;max-width:300px;
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:14px;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    box-shadow:0 8px 30px rgba(0,10,40,0.6);
    opacity:0;pointer-events:none;
    transition:opacity .35s ease, top .5s cubic-bezier(.34,1.56,.64,1), left .5s cubic-bezier(.34,1.56,.64,1);
  }
  .alert-box.active{opacity:1;pointer-events:all;}
  .alert-title{
    background:linear-gradient(90deg,#8A2E4B,var(--accent-pink));
    padding:8px 12px;border-radius:14px 14px 0 0;
    font-size:12.5px;font-weight:500;display:flex;justify-content:space-between;
  }
  .alert-content{padding:16px;display:flex;align-items:flex-start;gap:12px;}
  .alert-icon{
    flex-shrink:0;width:26px;height:26px;border-radius:50%;
    background:#FF5F57;color:#fff;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;box-shadow:0 0 8px rgba(255,95,87,.6);
  }
  .alert-content p{font-size:13.5px;margin:0;text-align:left;line-height:1.5;color:#F3F6FF;}
  .alert-box .btn{margin:0 16px 14px;padding:7px 20px;font-size:13px;}

  /* ===== Countdown ===== */
  #countdown-text{
    position:fixed;z-index:12;display:none;
    font-family:'Poppins',sans-serif;font-weight:700;
    font-size:clamp(70px,22vw,130px);
    color:#fff;text-shadow:0 0 25px var(--primary-light),0 0 60px var(--accent-pink);
    transition:transform .15s ease;
  }

  /* ===== Final screen ===== */
  #final-screen{
    position:relative;z-index:10;display:none;flex-direction:column;align-items:center;
    text-align:center;padding:20px;max-width:420px;
    animation:fadeInUp 1s ease forwards;
  }
  @keyframes fadeInUp{
    from{opacity:0;transform:translateY(24px);}
    to{opacity:1;transform:translateY(0);}
  }
  #final-screen h1{
    font-family:'Kanit',sans-serif;font-weight:600;font-size:clamp(22px,6vw,30px);
    margin:0 0 8px;
    background:linear-gradient(90deg,var(--accent-gold),var(--accent-pink),var(--primary-light));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:none;
  }
  #final-screen .sub{color:#CFE0FF;font-size:14px;margin:0 0 16px;}
  .photo-placeholder{
    width:200px;height:200px;border-radius:16px;
    background:rgba(255,255,255,0.08);
    border:1px dashed rgba(255,255,255,0.35);
    display:flex;align-items:center;justify-content:center;
    color:#B9CBEF;font-size:13px;margin-bottom:16px;
  }
  .time-counter{
    background:var(--glass);border:1px solid var(--glass-border);
    padding:16px 18px;border-radius:14px;font-size:14px;line-height:1.8;
    backdrop-filter:blur(14px);box-shadow:0 6px 24px rgba(0,10,40,.5);
  }
  .time-counter b{color:var(--accent-gold);}

  #sound-toggle{
    position:fixed;top:14px;right:14px;z-index:30;
    width:38px;height:38px;border-radius:50%;
    background:var(--glass);border:1px solid var(--glass-border);
    color:#fff;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="nebula n1"></div>
<div class="nebula n2"></div>
<div class="nebula n3"></div>
<canvas id="confetti-canvas"></canvas>
<canvas id="fireworks-canvas"></canvas>

<button id="sound-toggle" onclick="toggleSound()">🔊</button>

<!-- Step 1: birthday input -->
<div id="step1" class="os-window active">
  <div class="title-bar">
    <span>🪐 Verification.exe</span>
    <div class="traffic"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
  </div>
  <div class="content">
    <p>กรุณายืนยันวันเกิดของคุณเพื่อเข้าใช้งาน:</p>
    <input type="date" id="bday-input">
    <br>
    <button class="btn" onclick="startTroll()">Submit</button>
  </div>
</div>

<!-- Floating troll dialog -->
<div id="step2" class="alert-box">
  <div class="alert-title">
    <span>⚠ System Message</span>
    <span>✕</span>
  </div>
  <div class="alert-content">
    <div class="alert-icon">!</div>
    <p id="troll-msg">อุ้ย กดไม่โดน</p>
  </div>
  <button class="btn" onclick="nextTroll()">OK</button>
</div>

<div id="countdown-text">3</div>

<div id="final-screen">
  <h1>Happy Birthday to my Luangmae 🎉</h1>
  <p class="sub">How far we have grown-up together</p>
  <div class="photo-placeholder">Photo Here</div>
  <div class="time-counter" id="timer">กำลังคำนวณ...</div>
</div>

<script>
/* ================= Starfield background ================= */
const starCanvas = document.getElementById('stars');
const sctx = starCanvas.getContext('2d');
function resizeStars(){ starCanvas.width = innerWidth; starCanvas.height = innerHeight; }
resizeStars(); window.addEventListener('resize', resizeStars);
const stars = Array.from({length:140}, () => ({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:Math.random()*1.4+.2, a:Math.random(), speed:Math.random()*0.015+0.003
}));
function drawStars(){
  sctx.clearRect(0,0,starCanvas.width,starCanvas.height);
  sctx.fillStyle = '#0a0f2b';
  sctx.fillRect(0,0,starCanvas.width,starCanvas.height);
  stars.forEach(s=>{
    s.a += s.speed;
    const alpha = Math.abs(Math.sin(s.a));
    sctx.beginPath();
    sctx.fillStyle = `rgba(255,255,255,${alpha})`;
    sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

/* ================= Sound engine (Web Audio, no external files) ================= */
let audioCtx = null, soundOn = true;
function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function toggleSound(){
  soundOn = !soundOn;
  document.getElementById('sound-toggle').textContent = soundOn ? '🔊' : '🔇';
}
function tone(freq, duration=0.15, type='sine', delay=0, gain=0.08){
  if(!soundOn) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.value = gain;
  osc.connect(g); g.connect(audioCtx.destination);
  const t0 = audioCtx.currentTime + delay;
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+duration);
  osc.start(t0); osc.stop(t0+duration+0.02);
}
function sfxClick(){ tone(520,0.1,'triangle'); }
function sfxError(){ tone(220,0.18,'sawtooth'); tone(160,0.22,'sawtooth',0.08); }
function sfxTick(){ tone(880,0.08,'square'); }
function sfxFanfare(){
  [523,659,784,1046].forEach((f,i)=>tone(f,0.35,'triangle',i*0.12,0.09));
}

/* ================= Troll flow ================= */
const metDate = new Date("2017-05-15T00:00:00");
let trollStep = 1;
const step1 = document.getElementById('step1');
const step2 = document.getElementById('step2');
const trollMsg = document.getElementById('troll-msg');
const countdownText = document.getElementById('countdown-text');
const finalScreen = document.getElementById('final-screen');

function startTroll(){
  const bday = document.getElementById('bday-input').value;
  if(bday !== '2004-07-16'){
    sfxError();
    alert("กรุณาใส่วันเกิดให้ถูกก่อนนะคะ 😉");
    return;
  }
  sfxClick();
  step1.classList.remove('active');
  setTimeout(()=>{ moveBoxRandomly(); step2.classList.add('active'); }, 300);
}

const messages = [
  "เมื่อไหร่จะโดน",
  "มีอะไรจะบอก",
  "กุดีใจที่ได้ทักมึงนะ วันนั้น",
  "กุดีใจที่ได้โตมาด้วยกัน",
  "ใช่...ชีวิตมันยาก แต่กุว่ามึงเก่งมากเลยว่ะที่ผ่านมาได้",
  "มันไม่ใช่ว่าแค่เรื่องเล็กๆทำไมต้องคิดมาก แต่แค่เรื่องเล็กๆทำไมถึงไม่ทำ",
  "อยู่กับกุไปนานๆนะ"
];

function nextTroll(){
  sfxClick();
  step2.classList.remove('active');
  trollStep++;
  if(trollStep-2 < messages.length){
    trollMsg.innerText = messages[trollStep-2];
    setTimeout(()=>{ moveBoxRandomly(); step2.classList.add('active'); }, 200);
  } else {
    startCountdown();
  }
}

let lastX = innerWidth/2, lastY = innerHeight/2;
function moveBoxRandomly(){
  const boxWidth = step2.offsetWidth || 280;
  const boxHeight = step2.offsetHeight || 140;
  const maxX = Math.max(10, innerWidth - boxWidth - 20);
  const maxY = Math.max(10, innerHeight - boxHeight - 20);
  let newX, newY, distance = 0, attempts = 0;
  do{
    newX = 10 + Math.random()*(maxX-10);
    newY = 10 + Math.random()*(maxY-10);
    const dx = newX-lastX, dy = newY-lastY;
    distance = Math.sqrt(dx*dx+dy*dy);
    attempts++;
  } while(distance < 150 && attempts < 50);
  lastX = newX; lastY = newY;
  step2.style.left = newX+'px';
  step2.style.top = newY+'px';
}

/* ================= Countdown ================= */
function startCountdown(){
  document.getElementById('fireworks-canvas').style.display = 'block';
  startFireworks();
  countdownText.style.display = 'block';
  let count = 3;
  countdownText.innerText = count;
  sfxTick();
  const interval = setInterval(()=>{
    count--;
    if(count > 0){
      countdownText.style.transform = 'scale(0.8)';
      sfxTick();
      setTimeout(()=>{
        countdownText.innerText = count;
        countdownText.style.transform = 'scale(1.2)';
      }, 50);
    } else {
      clearInterval(interval);
      countdownText.style.display = 'none';
      showFinalScreen();
    }
  }, 1000);
}

/* ================= Final screen ================= */
function showFinalScreen(){
  sfxFanfare();
  finalScreen.style.display = 'flex';
  document.getElementById('confetti-canvas').style.display = 'block';
  startConfetti();
  setInterval(updateTimer, 1000);
  updateTimer();
}

function updateTimer(){
  const now = new Date();
  let d = new Date(now);
  let y = d.getFullYear() - metDate.getFullYear();
  let m = d.getMonth() - metDate.getMonth();
  let dt = d.getDate() - metDate.getDate();
  if(dt < 0){ m--; const temp = new Date(d.getFullYear(), d.getMonth(), 0); dt += temp.getDate(); }
  if(m < 0){ y--; m += 12; }
  let hr = d.getHours() - metDate.getHours();
  if(hr < 0){ dt--; hr += 24; }
  let min = d.getMinutes() - metDate.getMinutes();
  if(min < 0){ hr--; min += 60; }
  let sec = d.getSeconds() - metDate.getSeconds();
  if(sec < 0){ min--; sec += 60; }
  document.getElementById('timer').innerHTML =
    `<b>${y}</b> ปี : <b>${m}</b> เดือน : <b>${dt}</b> วัน<br><b>${hr}</b> ชม. : <b>${min}</b> นาที : <b>${sec}</b> วิ`;
}

/* ================= Fireworks ================= */
const fwCanvas = document.getElementById('fireworks-canvas');
const fctx = fwCanvas.getContext('2d');
fwCanvas.width = innerWidth; fwCanvas.height = innerHeight;
window.addEventListener('resize', ()=>{ fwCanvas.width = innerWidth; fwCanvas.height = innerHeight; });
let fwParticles = [];
const fwColors = ['#00539C','#3E86C9','#FFD166','#FF6FA5','#7A2E8E'];
function createFirework(x,y){
  const color = fwColors[Math.floor(Math.random()*fwColors.length)];
  for(let i=0;i<55;i++){
    fwParticles.push({
      x,y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8,
      color, alpha:1, decay:Math.random()*0.015+0.012
    });
  }
}
function startFireworks(){
  function animate(){
    requestAnimationFrame(animate);
    fctx.globalCompositeOperation = 'destination-out';
    fctx.fillStyle = 'rgba(0,0,0,0.2)';
    fctx.fillRect(0,0,fwCanvas.width,fwCanvas.height);
    fctx.globalCompositeOperation = 'lighter';
    fwParticles.forEach((p,i)=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.alpha-=p.decay;
      fctx.fillStyle = p.color; fctx.globalAlpha = Math.max(0,p.alpha);
      fctx.beginPath(); fctx.arc(p.x,p.y,2.5,0,Math.PI*2); fctx.fill();
      if(p.alpha<=0) fwParticles.splice(i,1);
    });
    if(Math.random()<0.05) createFirework(Math.random()*fwCanvas.width, Math.random()*(fwCanvas.height*0.5));
  }
  animate();
}

/* ================= Confetti ================= */
const cCanvas = document.getElementById('confetti-canvas');
const cctx = cCanvas.getContext('2d');
cCanvas.width = innerWidth; cCanvas.height = innerHeight;
window.addEventListener('resize', ()=>{ cCanvas.width = innerWidth; cCanvas.height = innerHeight; });
let confetti = [];
const confettiColors = ['#00539C','#3E86C9','#FFD166','#FF6FA5','#FFFFFF'];
function initConfetti(){
  confetti = Array.from({length:140}, ()=>({
    x:Math.random()*cCanvas.width, y:-20-Math.random()*cCanvas.height,
    r:Math.random()*5+3, color:confettiColors[Math.floor(Math.random()*confettiColors.length)],
    speed:Math.random()*2.5+1.5, drift:Math.random()*2-1, rot:Math.random()*360, rotSpeed:Math.random()*4-2
  }));
}
function startConfetti(){
  initConfetti();
  function animate(){
    requestAnimationFrame(animate);
    cctx.clearRect(0,0,cCanvas.width,cCanvas.height);
    confetti.forEach(p=>{
      p.y += p.speed; p.x += p.drift; p.rot += p.rotSpeed;
      if(p.y > cCanvas.height+20){ p.y = -20; p.x = Math.random()*cCanvas.width; }
      cctx.save();
      cctx.translate(p.x,p.y); cctx.rotate(p.rot*Math.PI/180);
      cctx.fillStyle = p.color;
      cctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);
      cctx.restore();
    });
  }
  animate();
}
</script>

</body>
</html>
